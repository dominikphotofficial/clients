<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | DP.PORTFOLIO</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <a href="index.html"><img src="https://i.postimg.cc/Xvc3zYGK/dp-logo.png" alt="DP.PORTFOLIO Logo" class="logo"></a>
        <div class="header-actions">
            <div class="lang-switcher">
                <button data-lang="en" class="lang-btn active">EN</button>
                <span>|</span>
                <button data-lang="lt" class="lang-btn">LT</button>
            </div>
            <button id="logout-btn" class="btn-outline">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                <span data-i18n="logout">Logout</span>
            </button>
        </div>
    </header>
    <main class="container">
        <div class="admin-section">
            <h1 class="page-title" data-i18n="admin_dashboard">Photographer Dashboard</h1>
            <div class="form-grid">
                <div class="form-group">
                    <label for="admin-name" data-i18n="client_name">Client Name</label>
                    <input type="text" id="admin-name" class="form-control">
                </div>
                <div class="form-group">
                    <label for="admin-surname" data-i18n="client_surname">Client Surname</label>
                    <input type="text" id="admin-surname" class="form-control">
                </div>
                <div class="form-group">
                    <label for="admin-code" data-i18n="admin_code_label">Gallery Code (e.g. dominik/vestuves)</label>
                    <input type="text" id="admin-code" class="form-control">
                </div>
                <div class="form-group">
                    <label for="admin-price-single" data-i18n="price_single">Price per Photo (€)</label>
                    <input type="number" id="admin-price-single" class="form-control" step="0.01">
                </div>
                <div class="form-group">
                    <label for="admin-price-full" data-i18n="price_full">Price for Full Gallery (€)</label>
                    <input type="number" id="admin-price-full" class="form-control" step="0.01">
                </div>
            </div>
            <div class="form-group" style="margin-top: 1rem;">
                <label for="admin-files" data-i18n="admin_files_label">Select High-Resolution Images</label>
                <input type="file" id="admin-files" class="form-control" multiple accept="image/*">
            </div>
            <button id="upload-btn" class="btn" style="margin-top: 2rem;">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                <span data-i18n="create_upload">Create Gallery & Upload</span>
            </button>
        </div>
    </main>
    <script type="module" src="app.js"></script>
</body>
</html>
