<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Portal | DP.PORTFOLIO</title>
    <meta name="description" content="Manage your premium photography gallery.">
    <link rel="canonical" href="https://client.dominikphotofficial.lt/client.html">
    <meta property="og:title" content="Client Portal | DP.PORTFOLIO">
    <meta property="og:image" content="https://i.postimg.cc/Xvc3zYGK/dp-logo.png">
    <meta property="og:url" content="https://client.dominikphotofficial.lt/client.html">
    <meta property="og:type" content="website">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <a href="index.html"><img src="https://i.postimg.cc/Xvc3zYGK/dp-logo.png" alt="DP.PORTFOLIO Logo" class="logo"></a>
        <div class="header-actions">
            <div class="lang-switcher">
                <button data-lang="en" class="lang-btn active">EN</button>
                <span>|</span>
                <button data-lang="lt" class="lang-btn">LT</button>
            </div>
            <button id="cart-toggle" class="icon-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
                <span id="cart-badge" class="badge">0</span>
            </button>
            <button id="logout-btn" class="btn-outline">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                <span data-i18n="logout">Logout</span>
            </button>
        </div>
    </header>
    
    <div id="cart-sidebar" class="cart-sidebar">
        <div class="cart-header">
            <h2 data-i18n="your_selection">Your Selection</h2>
            <button id="cart-close" class="icon-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            </button>
        </div>
        <div class="cart-body" id="cart-items"></div>
        <div class="cart-footer">
            <div class="cart-total">
                <span data-i18n="total">Total:</span>
                <span id="cart-total-price">€0.00</span>
            </div>
            <button id="buy-full-btn" class="btn-outline full-width" style="margin-bottom: 1rem;" data-i18n="buy_full">Buy Full Gallery</button>
            <div class="payment-options">
                <button id="pay-paypal" class="btn full-width" data-i18n="pay_paypal">Pay with PayPal</button>
                <button id="pay-revolut" class="btn full-width" data-i18n="pay_revolut">Pay with Revolut</button>
            </div>
        </div>
    </div>
    <div id="cart-overlay" class="cart-overlay hidden"></div>

    <main class="container">
        <div class="gallery-header">
            <h1 class="page-title" id="client-gallery-title" data-i18n="client_portal">Client Portal</h1>
            <div class="gallery-pricing" id="gallery-pricing-info"></div>
        </div>
        
        <div id="loader" class="loader hidden"></div>
        <div id="gallery-grid" class="gallery-grid"></div>

        <div class="comments-section">
            <h2 data-i18n="reviews">Gallery Reviews & Comments</h2>
            <div class="form-group" style="margin-top: 1rem;">
                <textarea id="comment-text" class="form-control" rows="4" data-i18n-placeholder="leave_feedback" placeholder="Leave your feedback here..."></textarea>
            </div>
            <button id="submit-comment" class="btn" style="width: auto; padding: 0.75rem 2rem;">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                <span data-i18n="submit_review">Submit Review</span>
            </button>
            <div id="comment-list" class="comment-list"></div>
        </div>
    </main>
    <div id="lightbox" class="lightbox hidden">
        <span id="lightbox-close">&times;</span>
        <img id="lightbox-img" src="" alt="Full screen view">
    </div>
    <script type="module" src="app.js"></script>
</body>
</html>
