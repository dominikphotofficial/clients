<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Portal | DP.PORTFOLIO</title>
    <meta name="description" content="Manage your premium photography gallery.">
    <link rel="canonical" href="https://dp-portfolio.com/client.html">
    <meta property="og:title" content="Client Portal | DP.PORTFOLIO">
    <meta property="og:image" content="https://i.postimg.cc/Xvc3zYGK/dp-logo.png">
    <meta property="og:type" content="website">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <a href="index.html"><img src="https://i.postimg.cc/Xvc3zYGK/dp-logo.png" alt="DP.PORTFOLIO Logo" class="logo"></a>
        <div class="header-actions">
            <div class="lang-switcher">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>
                <button data-lang="en" class="lang-btn active">EN</button>
                <span>|</span>
                <button data-lang="lt" class="lang-btn">LT</button>
            </div>
            <button id="logout-btn" class="btn-outline">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                <span data-i18n="logout">Logout</span>
            </button>
        </div>
    </header>
    <main class="container">
        <h1 style="text-align: center; margin-bottom: 2rem; font-weight: 300;" data-i18n="client_portal">Client Portal</h1>
        
        <div id="payment-section" class="payment-section">
            <h2 data-i18n="unlock_downloads">Unlock High-Resolution Downloads</h2>
            <p data-i18n="payment_desc">Complete your payment to enable full quality downloads.</p>
            <div class="payment-options">
                <button id="pay-paypal" class="btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="5" width="20" height="14" rx="2" ry="2"></rect><line x1="2" y1="10" x2="22" y2="10"></line></svg>
                    <span data-i18n="pay_paypal">Pay with PayPal</span>
                </button>
                <button id="pay-revolut" class="btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="5" width="20" height="14" rx="2" ry="2"></rect><line x1="2" y1="10" x2="22" y2="10"></line></svg>
                    <span data-i18n="pay_revolut">Pay with Revolut</span>
                </button>
            </div>
        </div>

        <div id="loader" class="loader hidden"></div>
        <div id="gallery-grid" class="gallery-grid"></div>

        <div class="comments-section">
            <h2 data-i18n="reviews">Gallery Reviews & Comments</h2>
            <div class="form-group" style="margin-top: 1rem;">
                <textarea id="comment-text" class="form-control" rows="4" data-i18n-placeholder="leave_feedback" placeholder="Leave your feedback here..."></textarea>
            </div>
            <button id="submit-comment" class="btn" style="width: auto; padding: 0.75rem 2rem;">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                <span data-i18n="submit_review">Submit Review</span>
            </button>
            <div id="comment-list" class="comment-list"></div>
        </div>
    </main>
    <div id="lightbox" class="lightbox hidden">
        <span id="lightbox-close">&times;</span>
        <img id="lightbox-img" src="" alt="Full screen view">
    </div>
    <script type="module" src="app.js"></script>
</body>
</html>
