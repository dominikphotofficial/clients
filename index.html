<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DP.PORTFOLIO | Premium Photography by Dominik Šuškevič</title>
    <meta name="description" content="Premium photography client portal by Dominik Šuškevič. Access your private galleries, download high-resolution photos, and order prints.">
    <link rel="canonical" href="https://client.dominikphotofficial.lt/">
    <meta property="og:title" content="DP.PORTFOLIO | Premium Photography">
    <meta property="og:description" content="Premium photography client portal by Dominik Šuškevič.">
    <meta property="og:image" content="https://i.postimg.cc/Xvc3zYGK/dp-logo.png">
    <meta property="og:url" content="https://client.dominikphotofficial.lt/">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="DP.PORTFOLIO | Premium Photography">
    <meta name="twitter:description" content="Premium photography client portal by Dominik Šuškevič.">
    <meta name="twitter:image" content="https://i.postimg.cc/Xvc3zYGK/dp-logo.png">
    <link rel="stylesheet" href="style.css">
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "PhotographyBusiness",
      "name": "DP.PORTFOLIO",
      "image": "https://i.postimg.cc/Xvc3zYGK/dp-logo.png",
      "founder": {
        "@type": "Person",
        "name": "Dominik Šuškevič"
      },
      "url": "https://client.dominikphotofficial.lt/",
      "description": "Premium photography client portal."
    }
    </script>
</head>
<body>
    <header>
        <img src="https://i.postimg.cc/Xvc3zYGK/dp-logo.png" alt="DP.PORTFOLIO Logo" class="logo">
        <div class="lang-switcher">
            <button data-lang="en" class="lang-btn active">EN</button>
            <span>|</span>
            <button data-lang="lt" class="lang-btn">LT</button>
        </div>
    </header>
    <main class="container">
        <div class="info-text">
            <p data-i18n="info_text">This website is dedicated to client galleries and order management.</p>
        </div>
        <div class="auth-container">
            <div class="form-group">
                <label for="gallery-code" data-i18n="enter_code">Enter Gallery Code</label>
                <input type="text" id="gallery-code" class="form-control" data-i18n-placeholder="placeholder_code" placeholder="e.g. name/gallery or 3829/vestuves">
                <button id="submit-code" class="btn" style="margin-top: 1rem;">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                    <span data-i18n="access_gallery">Access Gallery</span>
                </button>
            </div>
            <div class="divider"><span data-i18n="client_login">CLIENT LOGIN</span></div>
            <button id="google-auth" class="social-btn">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                <span data-i18n="sign_google">Sign in with Google</span>
            </button>
            <button id="apple-auth" class="social-btn">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.05 2.78.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.61 1.54-1.53 2.99-2.53 4.08zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/></svg>
                <span data-i18n="sign_apple">Sign in with Apple</span>
            </button>
        </div>
    </main>
    <script type="module" src="app.js"></script>
</body>
</html>
