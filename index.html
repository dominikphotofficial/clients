<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DP.PORTFOLIO | Premium Photography by Dominik Šuškevič</title>
    <meta name="description" content="Premium photography client portal by Dominik Šuškevič. Access your private galleries, download high-resolution photos, and order prints.">
    <link rel="canonical" href="https://dp-portfolio.com/">
    <meta property="og:title" content="DP.PORTFOLIO | Premium Photography">
    <meta property="og:description" content="Premium photography client portal by Dominik Šuškevič.">
    <meta property="og:image" content="https://i.postimg.cc/Xvc3zYGK/dp-logo.png">
    <meta property="og:url" content="https://dp-portfolio.com/">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="DP.PORTFOLIO | Premium Photography">
    <meta name="twitter:description" content="Premium photography client portal by Dominik Šuškevič.">
    <meta name="twitter:image" content="https://i.postimg.cc/Xvc3zYGK/dp-logo.png">
    <link rel="stylesheet" href="style.css">
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "PhotographyBusiness",
      "name": "DP.PORTFOLIO",
      "image": "https://i.postimg.cc/Xvc3zYGK/dp-logo.png",
      "founder": {
        "@type": "Person",
        "name": "Dominik Šuškevič"
      },
      "url": "https://dp-portfolio.com/",
      "description": "Premium photography client portal."
    }
    </script>
</head>
<body>
    <header>
        <img src="https://i.postimg.cc/Xvc3zYGK/dp-logo.png" alt="DP.PORTFOLIO Logo" class="logo">
    </header>
    <main class="container">
        <div class="auth-container">
            <div class="form-group">
                <label for="gallery-code">Enter Gallery Code</label>
                <input type="text" id="gallery-code" class="form-control" placeholder="e.g. name/gallery or 3829/vestuves">
                <button id="submit-code" class="btn" style="margin-top: 1rem;">Access Gallery</button>
            </div>
            <div class="divider"><span>OR</span></div>
            <div class="tabs">
                <div class="tab active" id="tab-login">Login</div>
                <div class="tab" id="tab-register">Register</div>
            </div>
            <div id="form-login">
                <div class="form-group">
                    <label for="login-email">Email</label>
                    <input type="email" id="login-email" class="form-control">
                </div>
                <div class="form-group">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" class="form-control">
                </div>
                <button id="login-btn" class="btn">Sign In</button>
            </div>
            <div id="form-register" class="hidden">
                <div class="form-group">
                    <label for="reg-email">Email</label>
                    <input type="email" id="reg-email" class="form-control">
                </div>
                <div class="form-group">
                    <label for="reg-password">Password</label>
                    <input type="password" id="reg-password" class="form-control">
                </div>
                <button id="reg-btn" class="btn">Create Account</button>
            </div>
            <div class="divider"><span>SOCIAL</span></div>
            <button id="google-auth" class="social-btn">Sign in with Google</button>
            <button id="apple-auth" class="social-btn">Sign in with Apple</button>
        </div>
    </main>
    <script type="module" src="app.js"></script>
</body>
</html>
