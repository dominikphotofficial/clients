<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guest Gallery | DP.PORTFOLIO</title>
    <meta name="description" content="View your event photos on DP.PORTFOLIO.">
    <link rel="canonical" href="https://client.dominikphotofficial.lt/guest.html">
    <meta property="og:title" content="Guest Gallery | DP.PORTFOLIO">
    <meta property="og:image" content="https://i.postimg.cc/Xvc3zYGK/dp-logo.png">
    <meta property="og:url" content="https://client.dominikphotofficial.lt/guest.html">
    <meta property="og:type" content="website">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <a href="index.html"><img src="https://i.postimg.cc/Xvc3zYGK/dp-logo.png" alt="DP.PORTFOLIO Logo" class="logo"></a>
        <div class="lang-switcher">
            <button data-lang="en" class="lang-btn active">EN</button>
            <span>|</span>
            <button data-lang="lt" class="lang-btn">LT</button>
        </div>
    </header>
    <main class="container">
        <h1 class="page-title" data-i18n="guest_gallery">Guest Gallery</h1>
        <div id="loader" class="loader hidden"></div>
        <div id="gallery-grid" class="gallery-grid"></div>
    </main>
    <div id="lightbox" class="lightbox hidden">
        <span id="lightbox-close">&times;</span>
        <img id="lightbox-img" src="" alt="Full screen view">
    </div>
    <script type="module" src="app.js"></script>
</body>
</html>
